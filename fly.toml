# Replace with your Fly app name (chosen during `fly launch`)
app = "socratic-learning"
primary_region = "iad"

[build]

[deploy]
  release_command = "bun server/migrate.ts"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
